name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run verify:router-boundary
      - run: npm run verify:falsification
      - run: npm run verify:context-freshness
      - run: npm run verify:spec-traceability
      - run: npm run verify:redaction
      - run: npm run check:budget-guard
      - run: npm run build
