&lt;main class="report"&gt;
  &lt;header class="hero" id="top"&gt;
    &lt;p class="eyebrow"&gt;PMI KC Operations Console · V1 State Report&lt;/p&gt;
    &lt;h1&gt;Substantial product, deliberately not yet final V1.&lt;/h1&gt;
    &lt;p class="hero-copy"&gt;
      The application plane is broad and well tested: the Console, Spaces, mobile approvals, scoped staff access,
      workflow communications, Lease Renewal, Maintenance, Vendor boundaries, trusted publication, retention, and
      typed external-action adapters are built. The remaining work is concentrated in production configuration,

  &lt;section class="report-section" id="summary"&gt;
    &lt;h2&gt;Current state at a glance&lt;/h2&gt;
    &lt;p class="lede"&gt;
      “Pre‑V1” is a release-control label, not a statement that the app is empty. Most user-facing and safety-boundary
      development is present. Final V1 requires the real external systems to prove each permitted action under their
      exact contracts, permissions, mappings, monitoring, and correction paths.
    &lt;/p&gt;
    &lt;div class="metrics"&gt;
      &lt;div class="metric" data-tone="green"&gt;&lt;strong&gt;286&lt;/strong&gt;&lt;span&gt;unit-test files green&lt;/span&gt;&lt;/div&gt;
      &lt;div class="metric" data-tone="green"&gt;&lt;strong&gt;1,984&lt;/strong&gt;&lt;span&gt;unit tests passed&lt;/span&gt;&lt;/div&gt;
      &lt;div class="metric" data-tone="blue"&gt;&lt;strong&gt;30&lt;/strong&gt;&lt;span&gt;typed Lease + Maintenance action paths&lt;/span&gt;&lt;/div&gt;
      &lt;div class="metric" data-tone="purple"&gt;&lt;strong&gt;29&lt;/strong&gt;&lt;span&gt;unique external action proofs required&lt;/span&gt;&lt;/div&gt;
      &lt;div class="metric" data-tone="amber"&gt;&lt;strong&gt;0&lt;/strong&gt;&lt;span&gt;external action proofs accepted&lt;/span&gt;&lt;/div&gt;
      &lt;div class="metric" data-tone="amber"&gt;&lt;strong&gt;169&lt;/strong&gt;&lt;span&gt;open release-evidence gates&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class="callout good"&gt;
      &lt;strong&gt;Bottom line&lt;/strong&gt;
      The safe local build program is complete and reproducible, and commit
      &lt;code&gt;0dc0c7aa7be600e1097e80de448227917dc9101a&lt;/code&gt; is deployed as
      &lt;code&gt;pmi-kc-kb-demo-00021-bj8&lt;/code&gt; with 100% traffic. The next value comes from verifying the
      deployed workflow boundaries, configuring only approved production resources, and closing provider/action evidence
      one bounded row at a time. Closed actions remain visibly unavailable; the app does not guess an endpoint or silently
      fall back to demo data.
    &lt;/div&gt;
    &lt;div class="callout warn"&gt;

  &lt;section class="report-section" id="status-language"&gt;

  &lt;section class="report-section" id="suites"&gt;
    &lt;h2&gt;Feature-set map&lt;/h2&gt;
    &lt;p class="lede"&gt;
      S14–S19 cover the major user experience, access, attention, anticipation, and Gmail layers. S20–S27 add the
      final-V1 safety and external-execution contracts. “Gated” below means the typed boundary exists while real
      provider authority or evidence is still absent.

    &lt;div class="table-wrap"&gt;

        &lt;dl&gt;&lt;dt&gt;Purpose&lt;/dt&gt;&lt;dd&gt;One place for decisions, review history, and high-risk execution approval.&lt;/dd&gt;&lt;dt&gt;What exists&lt;/dt&gt;&lt;dd&gt;Urgent-first queue, alternate views, mobile one-card renewal decider, safe inline approval, bulk tools, writeback proposals, activity, and metrics.&lt;/dd&gt;&lt;dt&gt;What remains&lt;/dt&gt;&lt;dd&gt;Real external actions remain closed until their own proofs and authority pass.&lt;/dd&gt;&lt;/dl&gt;

    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class="report-section" id="workflows"&gt;

      &lt;article class="card"&gt;&lt;h3&gt;Lease Renewal desk&lt;/h3&gt;&lt;p&gt;Simulation and optional Admin live-review lanes, run history, lease/property detail, reconciliation, mobile decision flow, source decisions, writeback proposals, and eleven exact external-action contracts.&lt;/p&gt;&lt;p class="fine-print"&gt;Routes include &lt;code&gt;/lease-renewal&lt;/code&gt;, runs, lease detail, property history, and reconciliation detail.&lt;/p&gt;&lt;/article&gt;

      &lt;/div&gt;

        &lt;div class="proof-ring"&gt;&lt;div&gt;&lt;strong&gt;0 / 29&lt;/strong&gt;&lt;span&gt;external proofs accepted&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;

  &lt;section class="report-section" id="verification"&gt;
    &lt;h2&gt;What the verification results mean&lt;/h2&gt;
    &lt;p class="lede"&gt;The verifier checks different failure classes. A green row is meaningful, but no single row proves the whole product is ready for live external execution.&lt;/p&gt;
    &lt;div class="table-wrap"&gt;
      &lt;table class="compact"&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;Gate&lt;/th&gt;&lt;th&gt;Result&lt;/th&gt;&lt;th&gt;Plain-language meaning&lt;/th&gt;&lt;th&gt;What it does not prove&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Clean install&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;span class="status built"&gt;Green&lt;/span&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Dependencies reinstall from the lockfile, so success is reproducible rather than dependent on a stale local folder.&lt;/td&gt;&lt;td data-label="Limit"&gt;Does not remove the three documented dev-tool advisories.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Formatting&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;span class="status built"&gt;Green&lt;/span&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Tracked source follows the repo’s mechanical style rules, reducing noisy diffs and accidental malformed files.&lt;/td&gt;&lt;td data-label="Limit"&gt;Style consistency is not behavior correctness.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Typecheck&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;span class="status built"&gt;Green&lt;/span&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;TypeScript’s data contracts agree across components, routes, stores, providers, and tests.&lt;/td&gt;&lt;td data-label="Limit"&gt;Cannot prove a provider’s undocumented real payload.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Lint&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;strong&gt;0 errors · 8 warnings&lt;/strong&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;No rule violation blocks release. The eight known warnings are unused mock parameters in tests, not runtime failures.&lt;/td&gt;&lt;td data-label="Limit"&gt;Warnings should remain tracked so the baseline does not quietly grow.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Unit suite&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;strong&gt;286 files · 1,984 passed&lt;/strong&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Fast isolated checks cover authority, permissions, schemas, adapters, UI states, security fences, cutover logic, and governance invariants.&lt;/td&gt;&lt;td data-label="Limit"&gt;Mocks and invented aliases cannot establish a real provider contract.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Firestore suite&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;strong&gt;16 files · 56 passed&lt;/strong&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Emulator tests exercise rules, transaction boundaries, client denials, retention state, and execution ledgers against Firestore behavior.&lt;/td&gt;&lt;td data-label="Limit"&gt;Production indexes/TTL/scheduler are still separately gated.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Core E2E&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;strong&gt;32 passed · 18 intentionally skipped&lt;/strong&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Full local user flows work end to end. The skipped scenarios are explicitly conditional on emulator/live prerequisites rather than hidden failures.&lt;/td&gt;&lt;td data-label="Limit"&gt;Skipped live/provider scenarios still require their named environment and authority.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Production build&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;strong&gt;73 page routes&lt;/strong&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Next.js successfully compiles the production application and its route graph.&lt;/td&gt;&lt;td data-label="Limit"&gt;Build success alone does not prove runtime behavior; the separately completed Cloud Run deployment is recorded below.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Governance checks&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;span class="status built"&gt;Green&lt;/span&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;Router, falsification, context freshness, spec traceability, redaction, and forbidden-boundary checks agree with the documented product contract.&lt;/td&gt;&lt;td data-label="Limit"&gt;Human/provider evidence must still be supplied honestly.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Gate"&gt;Cutover rehearsal&lt;/td&gt;&lt;td data-label="Result"&gt;&lt;span class="status built"&gt;Green&lt;/span&gt;&lt;/td&gt;&lt;td data-label="Meaning"&gt;A synthetic production-like manifest produces safe setup/import/deploy/rollback plans, and malformed input produces no dangerous commands.&lt;/td&gt;&lt;td data-label="Limit"&gt;It is a rehearsal; it does not claim a deploy, traffic shift, source import, or rollback happened.&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
    &lt;div class="callout info"&gt;
      &lt;strong&gt;“The all-in-one verifier is now in the full unit/build/governance phase”&lt;/strong&gt;
      That earlier sentence was a progress update: installation, dependency inventory, formatting, lint, and typecheck had already passed, and the slower behavior/build/governance checks were still running. Those later phases subsequently completed successfully on this release tree.
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class="report-section" id="release-gates"&gt;
    &lt;h2&gt;Why the report still says Pre‑V1&lt;/h2&gt;
    &lt;p class="lede"&gt;The 169 open gates are evidence checklist entries, not 169 missing screens or 169 software defects. Most are repeated proof requirements attached to exact external actions.&lt;/p&gt;
    &lt;div class="chart-card"&gt;
      &lt;div class="stacked-bar" role="img" aria-label="169 open gates: 5 identity pins, 14 suite gates, 143 action proofs, 5 release evidence items, and 2 named acceptances"&gt;
        &lt;span class="gate-pins"&gt;&lt;/span&gt;&lt;span class="gate-suites"&gt;&lt;/span&gt;&lt;span class="gate-actions"&gt;&lt;/span&gt;&lt;span class="gate-evidence"&gt;&lt;/span&gt;&lt;span class="gate-acceptance"&gt;&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class="chart-legend"&gt;
        &lt;div class="chart-key"&gt;&lt;span class="swatch" style="background:#155eef"&gt;&lt;/span&gt;&lt;span&gt;&lt;strong&gt;5&lt;/strong&gt; identity/pin gates&lt;/span&gt;&lt;/div&gt;
        &lt;div class="chart-key"&gt;&lt;span class="swatch" style="background:#5d8df2"&gt;&lt;/span&gt;&lt;span&gt;&lt;strong&gt;14&lt;/strong&gt; suite gates&lt;/span&gt;&lt;/div&gt;
        &lt;div class="chart-key"&gt;&lt;span class="swatch" style="background:#6441a5"&gt;&lt;/span&gt;&lt;span&gt;&lt;strong&gt;143&lt;/strong&gt; action-proof gates&lt;/span&gt;&lt;/div&gt;
        &lt;div class="chart-key"&gt;&lt;span class="swatch" style="background:#d28a12"&gt;&lt;/span&gt;&lt;span&gt;&lt;strong&gt;5&lt;/strong&gt; release-evidence gates&lt;/span&gt;&lt;/div&gt;
        &lt;div class="chart-key"&gt;&lt;span class="swatch" style="background:#a12b2b"&gt;&lt;/span&gt;&lt;span&gt;&lt;strong&gt;2&lt;/strong&gt; named acceptances&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class="grid-2" style="margin-top:14px"&gt;
      &lt;article class="card"&gt;&lt;h3&gt;What closes an action-proof row&lt;/h3&gt;&lt;p&gt;Authoritative non-secret provider contract and mappings; named credential owner/location; permission; one-attempt and idempotency behavior; exact readback or reconciliation; monitoring; correction/rollback; per-action authority; and evidence anchored to the pinned candidate.&lt;/p&gt;&lt;/article&gt;
      &lt;article class="card"&gt;&lt;h3&gt;Why this is useful&lt;/h3&gt;&lt;p&gt;A provider being connected is not enough. The checklist prevents a working Gmail token or Rentvine read key from silently becoming blanket permission to send, overwrite, post, pay, assign, or close.&lt;/p&gt;&lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class="report-section" id="dependency"&gt;
    &lt;h2&gt;Dependency posture, in ordinary language&lt;/h2&gt;
    &lt;div class="grid-2"&gt;
      &lt;article class="card"&gt;
        &lt;h3&gt;What the audit found&lt;/h3&gt;
        &lt;p&gt;&lt;strong&gt;Three Moderate findings, zero High, zero Critical, zero Low.&lt;/strong&gt; All three rows trace to one development-only Firebase CLI chain: &lt;code&gt;firebase-tools → @google-cloud/pubsub → @opentelemetry/core&lt;/code&gt;.&lt;/p&gt;
        &lt;p&gt;The affected packages are absent from the production dependency tree and application runtime bundle. This lowers reachability, but does not make the finding disappear.&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class="card"&gt;
        &lt;h3&gt;Why it is not auto-“fixed”&lt;/h3&gt;
        &lt;p&gt;The package manager’s offered fix is a major downgrade of &lt;code&gt;firebase-tools&lt;/code&gt;. Taking it only to obtain a zero would introduce compatibility risk in emulator/deployment tooling.&lt;/p&gt;
        &lt;p&gt;The recommended path is to track an upstream current-line fix, rerun the audit, and—if it remains at final acceptance—have a named technical owner record a time-bounded disposition and recheck date.&lt;/p&gt;
      &lt;/article&gt;
    &lt;/div&gt;
    &lt;div class="callout warn"&gt;&lt;strong&gt;Release consequence&lt;/strong&gt;There is no hidden High or Critical dependency problem. The remaining Moderate dev-tool chain is documented and bounded, but final S27 acceptance stays open until it is either remediated upstream or explicitly accepted for a limited period by the technical owner.&lt;/div&gt;
  &lt;/section&gt;

  &lt;section class="report-section" id="remaining"&gt;
    &lt;h2&gt;What still needs built or implemented&lt;/h2&gt;
    &lt;p class="lede"&gt;The remaining work is best understood as four bounded programs, not a vague “finish the app” task.&lt;/p&gt;
    &lt;div class="remaining-grid"&gt;
      &lt;article class="remaining-card"&gt;&lt;h3&gt;&lt;span class="number"&gt;1&lt;/span&gt; Production configuration&lt;/h3&gt;&lt;ul class="plain-list"&gt;&lt;li&gt;Verify the pinned Pre‑V1 candidate on &lt;code&gt;pmi-kc-kb-demo-00021-bj8&lt;/code&gt; across approved roles, devices, unavailable states, and failure paths; code deployment is complete.&lt;/li&gt;&lt;li&gt;Approve production source roots and real scanner for trusted publication.&lt;/li&gt;&lt;li&gt;Deploy Firestore indexes/migration/TTL/cleanup schedule only with separate authority.&lt;/li&gt;&lt;li&gt;Configure Vendor Identity Platform, TOTP, OAuth consent/client, and token vault.&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
      &lt;article class="remaining-card"&gt;&lt;h3&gt;&lt;span class="number"&gt;2&lt;/span&gt; Provider contracts &amp; mappings&lt;/h3&gt;&lt;ul class="plain-list"&gt;&lt;li&gt;Rentvine renewal and work-order write semantics.&lt;/li&gt;&lt;li&gt;Dotloop, portal, SMS, Boom, LeadSimple, and QuickBooks account contracts.&lt;/li&gt;&lt;li&gt;Authoritative Sheet cells, recipients, properties/units, Vendors/trades, stages, accounts, and consent sources.&lt;/li&gt;&lt;li&gt;Never infer a provider endpoint or business field from its UI.&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
      &lt;article class="remaining-card"&gt;&lt;h3&gt;&lt;span class="number"&gt;3&lt;/span&gt; Reversible external proof&lt;/h3&gt;&lt;ul class="plain-list"&gt;&lt;li&gt;Use a permitted test environment or safe synthetic record first.&lt;/li&gt;&lt;li&gt;Prove one attempt, idempotency, exact readback, drift handling, reconciliation, and correction.&lt;/li&gt;&lt;li&gt;Record only bodyless IDs/hashes/status/timestamps.&lt;/li&gt;&lt;li&gt;Promote one reviewed Registry key at a time.&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
      &lt;article class="remaining-card"&gt;&lt;h3&gt;&lt;span class="number"&gt;4&lt;/span&gt; Release acceptance&lt;/h3&gt;&lt;ul class="plain-list"&gt;&lt;li&gt;Desktop/phone, role/scope, unavailable, provider-failure, and reconciliation browser evidence.&lt;/li&gt;&lt;li&gt;Rehearse traffic rollback to &lt;code&gt;pmi-kc-kb-demo-00020-24d&lt;/code&gt; without executing it unless required; record the result.&lt;/li&gt;&lt;li&gt;Close dependency disposition.&lt;/li&gt;&lt;li&gt;Dan business acceptance and Josiah technical acceptance on the same release identity.&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
      &lt;article class="remaining-card"&gt;&lt;h3&gt;&lt;span class="number"&gt;5&lt;/span&gt; Intentionally not being built&lt;/h3&gt;&lt;ul class="plain-list"&gt;&lt;li&gt;Generic mailbox browsing or free-form compose/send.&lt;/li&gt;&lt;li&gt;Autonomous, bulk, scheduled, or model-triggered external sends.&lt;/li&gt;&lt;li&gt;QuickBooks posting/payment/banking.&lt;/li&gt;&lt;li&gt;Guessed provider writes, Drive photo replace/delete, or cron auto-initiation.&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
      &lt;article class="remaining-card"&gt;&lt;h3&gt;&lt;span class="number"&gt;6&lt;/span&gt; Then repeat safely&lt;/h3&gt;&lt;ul class="plain-list"&gt;&lt;li&gt;Close the easiest authoritative action first.&lt;/li&gt;&lt;li&gt;Reuse the exact evidence format—not blanket permission.&lt;/li&gt;&lt;li&gt;Keep unavailable actions visible and explain why they are blocked.&lt;/li&gt;&lt;li&gt;Re-run the release manifest until all required evidence is accepted.&lt;/li&gt;&lt;/ul&gt;&lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class="report-section" id="questions"&gt;
    &lt;h2&gt;Genuine blockers and open questions&lt;/h2&gt;
    &lt;p class="lede"&gt;Recommended defaults stay closed and test-first. Previously answered R01–R09 product decisions should not be reopened.&lt;/p&gt;
    &lt;div class="callout good"&gt;&lt;strong&gt;Deployment checkpoint closed&lt;/strong&gt;Managed-account reauthentication and deployment completed: commit &lt;code&gt;0dc0c7aa7be600e1097e80de448227917dc9101a&lt;/code&gt; is running as &lt;code&gt;pmi-kc-kb-demo-00021-bj8&lt;/code&gt; with 100% traffic. Public sign-in and fail-closed authentication boundaries passed; this is no longer a blocker.&lt;/div&gt;
    &lt;div class="blocker-list"&gt;
      &lt;article class="blocker-card"&gt;&lt;div class="check"&gt;□&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Exact source roots and scanner ownership&lt;/h3&gt;&lt;p&gt;S21 needs approved connector/root/Space mappings and a production malware/sensitivity scanner contract.&lt;/p&gt;&lt;p class="recommendation"&gt;Recommendation: return IDs and mapping rules only—no source files or customer content—and keep publication closed until the real scanner fails safely.&lt;/p&gt;&lt;/div&gt;&lt;/article&gt;
      &lt;article class="blocker-card"&gt;&lt;div class="check"&gt;□&lt;/div&gt;&lt;div&gt;&lt;h3&gt;External Vendor production packet&lt;/h3&gt;&lt;p&gt;S22 needs Identity Platform/TOTP settings, OAuth consent/client, vault ownership, a controlled test Vendor, and later a real Vendor acceptance.&lt;/p&gt;&lt;p class="recommendation"&gt;Recommendation: test principal first, assigned-ticket-only; then repeat with one real Vendor. Never reuse DWD or an internal identity.&lt;/p&gt;&lt;/div&gt;&lt;/article&gt;
      &lt;article class="blocker-card"&gt;&lt;div class="check"&gt;□&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Provider action contracts and business mappings&lt;/h3&gt;&lt;p&gt;S25/S26 need official/account-specific endpoints, conditional mutation semantics, exact field/status mappings, permissions, readback, and correction for every action family.&lt;/p&gt;&lt;p class="recommendation"&gt;Recommendation: close one row at a time using the detailed client checklist; keep every unresolved Registry key false.&lt;/p&gt;&lt;/div&gt;&lt;/article&gt;
      &lt;article class="blocker-card"&gt;&lt;div class="check"&gt;□&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Dan review definition&lt;/h3&gt;&lt;p&gt;The Admin review digest currently uses returned writeback authorizations as the observable self-correction proxy; the desired cadence and broader “later stale/re-resolved” definition remain to confirm.&lt;/p&gt;&lt;p class="recommendation"&gt;Recommendation: retain the current value-free proxy and in-app default until Dan specifies cadence and inclusion rules; do not add scheduled delivery by inference.&lt;/p&gt;&lt;/div&gt;&lt;/article&gt;
      &lt;article class="blocker-card"&gt;&lt;div class="check"&gt;□&lt;/div&gt;&lt;div&gt;&lt;h3&gt;Final support and acceptance roster&lt;/h3&gt;&lt;p&gt;S27 needs a dated support window, escalation contact, operator/test identities, and named business/technical acceptance on the exact deployed commit/revision.&lt;/p&gt;&lt;p class="recommendation"&gt;Recommendation: Josiah owns technical/dependency/rollback evidence; Dan owns business outcomes; use the test-first Vendor and approved internal role matrix.&lt;/p&gt;&lt;/div&gt;&lt;/article&gt;
    &lt;/div&gt;
    &lt;div class="callout info"&gt;&lt;strong&gt;Detailed client handoff&lt;/strong&gt;The exact action-by-action evidence, credential-location labels, recommended closed defaults, first proof, and correction path live in &lt;a href="v1-client-unblock-checklist-2026-07-14.md"&gt;the V1 client-unblock checklist&lt;/a&gt;.&lt;/div&gt;
  &lt;/section&gt;

  &lt;section class="report-section" id="deployment"&gt;
    &lt;h2&gt;Deployment record&lt;/h2&gt;
    &lt;div class="table-wrap"&gt;
      &lt;table class="compact"&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Git branch&lt;/td&gt;&lt;td data-label="Value"&gt;&lt;code&gt;main&lt;/code&gt;; already synchronized, so there was no separate branch merge.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Published commit&lt;/td&gt;&lt;td data-label="Value"&gt;&lt;code&gt;0dc0c7aa7be600e1097e80de448227917dc9101a&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Cloud Build&lt;/td&gt;&lt;td data-label="Value"&gt;&lt;code&gt;9ae6958b-ec8c-48ef-bf0b-46dbe8194880&lt;/code&gt; · succeeded&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Application endpoint&lt;/td&gt;&lt;td data-label="Value"&gt;&lt;a href="https://pmi-kc-kb-demo-kq6wuvpiva-uc.a.run.app"&gt;https://pmi-kc-kb-demo-kq6wuvpiva-uc.a.run.app&lt;/a&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Cloud Run revision&lt;/td&gt;&lt;td data-label="Value" id="cloud-run-revision"&gt;&lt;code&gt;pmi-kc-kb-demo-00021-bj8&lt;/code&gt; (current); prior serving revision &lt;code&gt;pmi-kc-kb-demo-00020-24d&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Traffic / smoke&lt;/td&gt;&lt;td data-label="Value" id="traffic-smoke"&gt;100% traffic to &lt;code&gt;pmi-kc-kb-demo-00021-bj8&lt;/code&gt;. Both service hosts returned the expected public sign-in pages; staff and Vendor protected UI routes redirected correctly, and both protected APIs returned their expected unauthenticated 401 responses. This proves the public/auth boundary only—not signed-in roles or provider execution.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Cloud Run access&lt;/td&gt;&lt;td data-label="Value"&gt;Ingress is &lt;code&gt;all&lt;/code&gt; and the service intentionally disables the Cloud Run invoker IAM check; therefore the deploy command’s attempted &lt;code&gt;allUsers&lt;/code&gt; policy binding was unnecessary. Direct HTTP and browser checks confirmed reachability.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td data-label="Field"&gt;Release stage&lt;/td&gt;&lt;td data-label="Value"&gt;&lt;strong&gt;Pre‑V1&lt;/strong&gt; until the release manifest’s external evidence and named acceptances close.&lt;/td&gt;&lt;/tr&gt;

    &lt;div class="callout warn"&gt;&lt;strong&gt;Deployment is not action promotion&lt;/strong&gt;A code deployment may make new screens and safety boundaries available while the action Registry continues to block unproven provider mutations. That is the intended Pre‑V1 posture.&lt;/div&gt;

&lt;script src="https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js"&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set(["top", "right", "bottom", "left"]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest("[data-tooltip]")
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute("data-tooltip")?.trim() ?? "";
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute("data-tooltip-placement");
    return tooltipPlacements.has(placement) ? placement : "top";
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement("div");
      tooltip.id = tooltipId;
      tooltip.className = "tooltip";
      tooltip.setAttribute("role", "tooltip");
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute("aria-describedby") ?? "")
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute("aria-describedby");
    } else {
      trigger.setAttribute("aria-describedby", [...ids].join(" "));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              "--tooltip-available-width",
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              "--tooltip-available-height",
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: "fixed",
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = "visible";
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = "hidden";
    floating.style.transform = "translate(0, 0)";
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === "touch") {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(":focus-visible")) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === "Escape") {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener("pointerover", handlePointerOpen);
    document.removeEventListener("pointerout", handleLeave);
    document.removeEventListener("focusin", handleFocusIn);
    document.removeEventListener("focusout", handleLeave);
    document.removeEventListener("keydown", handleKeyDown);
    document.removeEventListener("contextmenu", handleContextMenu);
    tooltip = null;
  };

  document.addEventListener("pointerover", handlePointerOpen);
  document.addEventListener("pointerout", handleLeave);
  document.addEventListener("focusin", handleFocusIn);
  document.addEventListener("focusout", handleLeave);
  document.addEventListener("keydown", handleKeyDown);
  document.addEventListener("contextmenu", handleContextMenu);
  window.addEventListener("pagehide", destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });
  };
  if (globalThis.lucide != null) {
    initialize();
    return;
  }
  document
    .getElementById("codex-visualization-lucide")
    ?.addEventListener("load", initialize, { once: true });
})();
&lt;/script&gt;
